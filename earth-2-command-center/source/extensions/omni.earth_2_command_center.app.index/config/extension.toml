[package]
# Semantic Versioning is used: https://semver.org/
version = "1.0.0"

# Lists people or organizations that are considered the "authors" of the package.
authors = ["NVIDIA"]

# The title and description fields are primarily for displaying extension info in UI
title = "omni earth_2_command_center app index"
description="A simple python extension example to use as a starting point for your extensions."

# Path (relative to the root) or content of readme markdown file for UI.
readme  = "docs/README.md"

# URL of the extension source repository.
repository = ""

# One of categories for UI.
category = "Example"

# Keywords for the extension
keywords = ["kit", "example"]

# Location of change log file in target (final) folder of extension, relative to the root.
# More info on writing changelog: https://keepachangelog.com/en/1.0.0/
changelog="docs/CHANGELOG.md"

# Preview image and icon. Folder named "data" automatically goes in git lfs (see .gitattributes file).
# Preview image is shown in "Overview" of Extensions window. Screenshot of an extension might be a good preview image.
preview_image = "data/preview.png"

# Icon is shown in Extensions window, it is recommended to be square, of size 256x256.
icon = "data/icon.png"

# Use omni.ui to build simple UI
[dependencies]
"omni.kit.pipapi" = {}

# IndeX extensions
"omni.index.usd" = {}
"omni.rtx.index_composite" = {}

# Earth2 dependencies
"omni.earth_2_command_center.app.core" = {}
"omni.earth_2_command_center.app.window.feature_properties" = {}

# Main python module this extension provides, it will be publicly available as "import omni.earth_2_command_center.app.index".
[[python.module]]
name = "omni.earth_2_command_center.app.index"

[settings]
# needed to globally enable IndeX compositing.
rtx.index.compositeEnabled = 0

nvindex.plugins = "+base_importer,openvdb_integration,?e57_importer,icon_importer"
rtx.index.overrideSubdivisionMode = "kd_tree"
rtx.index.overrideSubdivisionPartCount = 1

exts."omni.earth_2_command_center.app.index".data_path="/home/nvidia/data/nvindex"
[[test]]
# Extra dependencies only to be used during test run
dependencies = [
    "omni.kit.ui_test" # UI testing extension
]

args = [
    # disable pcielink check to avoid NVML_ERROR_NOT_SUPPORTED errors when running
    # tests on vGPU runners
    "--/validate/pcielink/enabled=false",

    "--/app/fastShutdown=1",
    "--/app/file/ignoreUnsavedOnExit=true",
    "--/app/window/scaleToMonitor=false",
    "--no-window",
    "--reset-user"
]

[[test]]
name = "startup"
args = [
    # disable pcielink check to avoid NVML_ERROR_NOT_SUPPORTED errors when running
    # tests on vGPU runners
    "--/validate/pcielink/enabled=false",
]

